<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>SafeZone Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:#ECEEF2;-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;overflow:hidden;}
button,label{font-family:inherit;cursor:pointer;}
input[type=file]{display:none;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}

/* ══════════════════════════════════════
   TOP BAR
══════════════════════════════════════ */
#bar{
  background:#fff;border-bottom:1px solid #e0e2e8;
  flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06);
}

/* Row 1: logo + upload */
.bar-row1{
  height:52px;display:flex;align-items:center;
  padding:0 14px;gap:10px;
}
.logo{display:flex;align-items:center;gap:8px;flex:1;}
.logo-mark{width:30px;height:30px;border-radius:8px;
  background:linear-gradient(135deg,#5865f2,#9333ea);
  display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.logo-name{font-size:14px;font-weight:700;letter-spacing:-.02em;color:#111;}
.logo-tag{font-size:10px;color:#888;font-weight:400;}
.bar-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.tbtn{display:flex;align-items:center;gap:5px;padding:7px 12px;
  border-radius:8px;border:1.5px solid #e0e2e8;background:#fff;
  font-size:12px;font-weight:500;color:#666;cursor:pointer;white-space:nowrap;transition:all .12s;}
.tbtn.on{border-color:#ef444450;background:#ef44440a;color:#ef4444;font-weight:600;}
.newbtn{display:flex;align-items:center;gap:5px;padding:7px 11px;
  border-radius:8px;border:1.5px solid #e0e2e8;background:#fff;
  font-size:12px;font-weight:500;color:#555;cursor:pointer;white-space:nowrap;}
.upbtn{display:flex;align-items:center;gap:6px;padding:8px 16px;
  border-radius:8px;background:#111;color:#fff;font-size:12px;
  font-weight:600;border:none;cursor:pointer;white-space:nowrap;}

/* Row 2: platform scrollable tabs */
.bar-row2{
  display:flex;gap:6px;padding:0 14px 10px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.bar-row2::-webkit-scrollbar{display:none;}
.ptab{
  padding:6px 13px;border-radius:20px;border:1.5px solid #e0e2e8;
  background:#fff;font-size:12px;font-weight:500;color:#555;
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .12s;
}
.ptab.on{font-weight:700;}

/* ══════════════════════════════════════
   MAIN BODY
══════════════════════════════════════ */
#body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}

/* ══════════════════════════════════════
   STAGE
══════════════════════════════════════ */
#stage{
  flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;min-height:0;padding:12px;
}

/* On mobile: stack canvas + labels vertically */
#stage-inner{
  display:flex;align-items:flex-start;justify-content:center;
  gap:12px;width:100%;height:100%;
}

/* Canvas card */
#ccard{
  position:relative;flex-shrink:0;border-radius:10px;
  overflow:hidden;line-height:0;
  box-shadow:0 16px 40px rgba(0,0,0,.20),0 4px 12px rgba(0,0,0,.10);
}
#l-media{display:block;}
#l-zones{position:absolute;inset:0;pointer-events:none;}

/* Drop zone */
#dz{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;
  background:#18181c;cursor:pointer;transition:background .16s;
}
#dz.drag{background:#1c1930;}
#dz input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;}
.dz-ring{width:52px;height:52px;border-radius:14px;
  background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;}
.dz-t{font-size:13px;font-weight:600;color:#fff;text-align:center;padding:0 16px;}
.dz-s{font-size:11px;color:rgba(255,255,255,.3);text-align:center;padding:0 16px;}

/* ── Labels panel (right on desktop, below on mobile) */
#labels-panel{
  display:flex;flex-direction:column;gap:6px;
  flex-shrink:0;
}
.zlbl{
  display:flex;align-items:center;gap:7px;
  padding:5px 10px 5px 8px;
  background:rgba(255,255,255,.97);border:1px solid #dde0e8;
  border-radius:7px;font-size:11.5px;font-weight:500;color:#333;
  box-shadow:0 1px 4px rgba(0,0,0,.07);white-space:nowrap;
}
.zlbl.safe{border-color:#22c55e30;background:#f0fdf4;}
.zdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.zpct{font-size:10px;color:#aaa;font-family:'Courier New',monospace;}

/* ══════════════════════════════════════
   INFO PANEL (bottom)
══════════════════════════════════════ */
#info-panel{
  flex-shrink:0;background:#fff;border-top:1px solid #e0e2e8;
  overflow-y:auto;
}
/* Desktop: 3-col horizontal */
.info-inner{
  padding:14px 16px;display:flex;gap:14px;align-items:stretch;
}

/* Spec card */
.spec-card{
  background:#f8f9fc;border:1px solid #e8eaf0;border-radius:10px;
  padding:12px 14px;flex-shrink:0;
}
.spec-plat{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.spec-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.spec-name{font-size:13px;font-weight:700;color:#111;}
.spec-table{width:100%;border-collapse:collapse;}
.spec-table td{padding:3px 0;font-size:11.5px;color:#555;vertical-align:top;}
.spec-table td:first-child{font-weight:600;color:#333;padding-right:10px;white-space:nowrap;}
.spec-table td:last-child{font-family:'Courier New',monospace;color:#5865f2;}

/* Zone breakdown */
.zone-breakdown{flex:1;min-width:0;}
.zb-title{font-size:10.5px;font-weight:700;color:#999;text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:8px;}
.zb-rows{display:flex;flex-direction:column;gap:5px;}
.zb-row{display:flex;align-items:center;gap:7px;padding:5px 8px;
  background:#fef2f2;border:1px solid #fecaca;border-radius:6px;flex-wrap:wrap;}
.zb-row.safe-row{background:#f0fdf4;border-color:#bbf7d0;}
.zb-rdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.zb-label{font-size:11px;font-weight:500;color:#333;flex:1;min-width:100px;}
.zb-px{font-size:10px;color:#777;font-family:'Courier New',monospace;}
.zb-pct{font-size:10px;font-weight:600;color:#ef4444;background:#fee2e2;
  padding:1px 5px;border-radius:3px;white-space:nowrap;margin-left:auto;}
.zb-pct.safe-pct{color:#16a34a;background:#dcfce7;}

/* Tips */
.tips-col{flex-shrink:0;padding:0 0 0 14px;border-left:1px solid #e8eaf0;}
.tips-title{font-size:10.5px;font-weight:700;color:#999;text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:8px;}
.tip-item{display:flex;gap:6px;margin-bottom:5px;font-size:11px;color:#555;line-height:1.45;}
.tip-icon{font-size:11px;flex-shrink:0;margin-top:1px;}

/* ══════════════════════════════════════
   MOBILE RESPONSIVE  ≤ 600px
══════════════════════════════════════ */
@media (max-width: 600px) {
  .bar-row1{height:50px;padding:0 12px;}
  .logo-name{font-size:13px;}
  .logo-tag{display:none;}
  .tbtn span.tbtn-label{display:none;} /* hide text, keep icon */
  .bar-row2{padding:0 12px 9px;gap:5px;}
  .ptab{padding:5px 11px;font-size:11.5px;}

  #stage{padding:8px 10px;}
  #stage-inner{flex-direction:column;align-items:center;}

  /* Labels go below canvas on mobile */
  #labels-panel{
    flex-direction:row;flex-wrap:wrap;justify-content:center;
    gap:5px;width:100%;
  }
  .zlbl{font-size:11px;padding:4px 8px 4px 7px;}

  /* Info panel stacks on mobile */
  .info-inner{flex-direction:column;gap:10px;padding:10px 12px;}
  .spec-card{min-width:0;}
  .tips-col{border-left:none;border-top:1px solid #e8eaf0;
    padding:10px 0 0;width:100%;}
  .tips-col .tips-title{margin-top:0;}

  /* 2 cols for tips on mobile */
  .tips-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
  .tip-item{margin-bottom:0;}

  #info-panel{max-height:200px;}
}

/* ══════════════════════════════════════
   TABLET  601–900px
══════════════════════════════════════ */
@media (min-width:601px) and (max-width:900px) {
  #stage-inner{flex-direction:row;align-items:center;}
  #labels-panel{flex-direction:column;width:160px;}
  .info-inner{flex-direction:column;gap:10px;}
  .tips-col{border-left:none;border-top:1px solid #e8eaf0;padding:10px 0 0;}
  #info-panel{max-height:180px;}
}

/* ══════════════════════════════════════
   DESKTOP  > 900px
══════════════════════════════════════ */
@media (min-width:901px) {
  #stage-inner{flex-direction:row;align-items:center;}
  #labels-panel{flex-direction:column;width:185px;}
  .tips-col{width:200px;}
  #info-panel{max-height:200px;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="bar">
  <div class="bar-row1">
    <div class="logo">
      <div class="logo-mark">🛡️</div>
      <div>
        <div class="logo-name">SafeZone</div>
        <div class="logo-tag">Ad Safe Zone Checker</div>
      </div>
    </div>
    <div class="bar-actions">
      <button class="tbtn on" id="btn-z" onclick="toggleZones()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <span class="tbtn-label">Zones</span>
      </button>
      <button class="newbtn" id="btn-new" style="display:none;" onclick="resetFile()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
        </svg>
        New
      </button>
      <label class="upbtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
        </svg>
        Upload
        <input type="file" id="fi" accept="image/jpeg,image/png,image/webp,video/mp4,video/webm,video/quicktime"
          onchange="handleFile(this.files[0]);this.value=''">
      </label>
    </div>
  </div>
  <!-- Platform tabs scrollable row -->
  <div class="bar-row2" id="ptabs"></div>
</div>

<!-- BODY -->
<div id="body">
  <div id="stage">
    <div id="stage-inner">
      <!-- Canvas -->
      <div id="ccard">
        <canvas id="l-media"></canvas>
        <div id="dz">
          <div class="dz-ring">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="1.8">
              <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
            </svg>
          </div>
          <p class="dz-t">Tap to upload your creative</p>
          <p class="dz-s">JPG · PNG · WebP · MP4 · WebM</p>
          <p class="dz-s" style="margin-top:-5px;">🔒 Stays in your browser</p>
          <input type="file" accept="image/jpeg,image/png,image/webp,video/mp4,video/webm,video/quicktime"
            onchange="handleFile(this.files[0]);this.value=''">
        </div>
        <svg id="l-zones" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <!-- Zone labels -->
      <div id="labels-panel"></div>
    </div>
  </div>

  <!-- Info panel -->
  <div id="info-panel">
    <div class="info-inner" id="info-inner"></div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// PLATFORM DATA
// ═══════════════════════════════════════════════════════════
const PLATS = [
  {
    id:'ig-stories', label:'IG Stories', color:'#E1306C',
    W:1080, H:1920, ar:9/16,
    res:'1080 × 1920 px', ratio:'9:16', safeArea:'1010 × 1280 px',
    zones:[
      {label:'Profile + Progress Bar', px:'268px', pct:'14%', y:0,    h:268},
      {label:'CTA / Swipe-Up Area',    px:'672px', pct:'35%', y:1248, h:672},
      {label:'Side Margins',           px:'65px',  pct:'6%',  x:0,    w:65, both:true},
    ],
    tips:[
      {icon:'👁', text:'Keep all content in central 1010×1280 px'},
      {icon:'📊', text:'Profile bar eats top 14%'},
      {icon:'🔗', text:'Swipe-up CTA covers bottom 35%'},
      {icon:'↔️', text:'6% each side = gesture zones'},
    ],
  },
  {
    id:'ig-reels', label:'IG Reels', color:'#E1306C',
    W:1080, H:1920, ar:9/16,
    res:'1080 × 1920 px', ratio:'9:16', safeArea:'1010 × 1280 px',
    zones:[
      {label:'Reels Header',        px:'268px', pct:'14%', y:0,    h:268},
      {label:'Caption + CTA + Nav', px:'672px', pct:'35%', y:1248, h:672},
      {label:'Side Margins',        px:'65px',  pct:'6%',  x:0,    w:65, both:true},
      {label:'Action Icons',        px:'216px', pct:'20%', x:864,  w:216},
    ],
    tips:[
      {icon:'🎯', text:'Action icons right 20% — never put logos there'},
      {icon:'📝', text:'Caption + CTA bar: bottom 35%'},
      {icon:'⚠️', text:'Boosting Story as Reel? Use stricter zone'},
      {icon:'💡', text:'Safe: 1010 × 1280 px centered'},
    ],
  },
  {
    id:'ig-feed-45', label:'Feed 4:5', color:'#1877F2',
    W:1080, H:1350, ar:4/5,
    res:'1080 × 1350 px', ratio:'4:5', safeArea:'1013 × 1135 px',
    zones:[
      {label:'Profile Header',     px:'120px', pct:'9%',  y:0,    h:120},
      {label:'Caption + Actions',  px:'298px', pct:'22%', y:1052, h:298},
      {label:'Side Margins',       px:'34px',  pct:'3%',  x:0,    w:34, both:true},
    ],
    tips:[
      {icon:'🖼', text:'4:5 = max feed real estate on mobile'},
      {icon:'📐', text:'Keep text 34px from each edge'},
      {icon:'💬', text:'Bottom 22% = caption + action bar'},
      {icon:'✅', text:'Best ratio for feed ads on Meta'},
    ],
  },
  {
    id:'ig-feed-11', label:'Feed 1:1', color:'#1877F2',
    W:1080, H:1080, ar:1,
    res:'1080 × 1080 px', ratio:'1:1', safeArea:'810 × 810 px',
    zones:[
      {label:'Profile Header',   px:'108px', pct:'10%', y:0,   h:108},
      {label:'Caption + Actions',px:'162px', pct:'15%', y:918, h:162},
      {label:'Side Margins',     px:'135px', pct:'12.5%',x:0,  w:135, both:true},
    ],
    tips:[
      {icon:'📦', text:'Classic Instagram square format'},
      {icon:'🎨', text:'Safe zone: 810 × 810 px center'},
      {icon:'⚡', text:'Works for feed + carousel ads'},
      {icon:'📱', text:'Full-width on all mobile screens'},
    ],
  },
  {
    id:'tiktok', label:'TikTok', color:'#FE2C55',
    W:1080, H:1920, ar:9/16,
    res:'1080 × 1920 px', ratio:'9:16', safeArea:'852 × 1266 px',
    zones:[
      {label:'Navigation Tabs',     px:'270px', pct:'14%', y:0,    h:270},
      {label:'Caption + CTA + Nav', px:'384px', pct:'20%', y:1536, h:384},
      {label:'Action Icons',        px:'228px', pct:'21%', x:852,  w:228},
    ],
    tips:[
      {icon:'🚫', text:'Right 21% = icons always — no brand here'},
      {icon:'📝', text:'Bottom 20% always unsafe — captions vary'},
      {icon:'🎵', text:'Music disc sits bottom-right'},
      {icon:'🎯', text:'Keep visuals left-center'},
    ],
  },
  {
    id:'snapchat', label:'Snapchat', color:'#FFFC00',
    W:1080, H:1920, ar:9/16,
    res:'1080 × 1920 px', ratio:'9:16', safeArea:'1080 × 1382 px',
    zones:[
      {label:'Brand Header', px:'250px', pct:'13%', y:0,    h:250},
      {label:'Swipe Up CTA', px:'288px', pct:'15%', y:1632, h:288},
    ],
    tips:[
      {icon:'👁', text:'Header: brand name + "Ad · 0:05"'},
      {icon:'⬆️', text:'Swipe-up CTA: bottom 15%'},
      {icon:'⏱', text:'Avg view 2–3s — hook in safe zone'},
      {icon:'🟡', text:'Yellow CTA always at bottom'},
    ],
  },
  {
    id:'yt-shorts', label:'YT Shorts', color:'#FF0000',
    W:1080, H:1920, ar:9/16,
    res:'1080 × 1920 px', ratio:'9:16', safeArea:'882 × 1282 px',
    zones:[
      {label:'Shorts Header',         px:'216px', pct:'11%', y:0,    h:216},
      {label:'Channel + Title + Nav', px:'422px', pct:'22%', y:1498, h:422},
      {label:'Action Icons',          px:'198px', pct:'18%', x:882,  w:198},
    ],
    tips:[
      {icon:'🚫', text:'Right 18% = Like/Dislike/Comment/Share'},
      {icon:'📺', text:'"Shorts" logo always top center'},
      {icon:'👤', text:'Channel + Subscribe: bottom 22%'},
      {icon:'🛒', text:'Shopping shelf can appear here'},
    ],
  },
];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let pid = 'ig-stories';
let DW = 0, DH = 0;
let mediaEl = null, isVid = false, murl = null, raf = null;
let showZ = true;
const plat = () => PLATS.find(p => p.id === pid);

// Is mobile?
const isMobile = () => window.innerWidth <= 600;

// ═══════════════════════════════════════════════════
// SIZING — adapts to screen size
// ═══════════════════════════════════════════════════
function calcSize() {
  const stage = document.getElementById('stage');
  const pl = plat();
  const mob = isMobile();

  let avW, avH;
  if (mob) {
    // Mobile: full width minus padding, leave room for labels below
    avW = Math.min(stage.clientWidth - 20, 300);
    avH = Math.min(stage.clientHeight - 80, 520);
  } else if (window.innerWidth <= 900) {
    // Tablet
    avW = Math.min(stage.clientWidth - 190, 280);
    avH = Math.min(stage.clientHeight - 30, 560);
  } else {
    // Desktop
    avW = Math.min(stage.clientWidth - 220, 300);
    avH = Math.min(stage.clientHeight - 30, 620);
  }

  if (avW / avH > pl.ar) { DH = Math.max(avH, 80); DW = Math.floor(DH * pl.ar); }
  else { DW = Math.max(avW, 60); DH = Math.floor(DW / pl.ar); }
}

function applySize() {
  calcSize();
  const card = document.getElementById('ccard');
  card.style.width = DW + 'px';
  card.style.height = DH + 'px';
  const mc = document.getElementById('l-media');
  mc.width = DW; mc.height = DH;
  mc.style.cssText = `display:block;width:${DW}px;height:${DH}px;`;
  const zs = document.getElementById('l-zones');
  zs.setAttribute('width', DW); zs.setAttribute('height', DH);
  zs.setAttribute('viewBox', `0 0 ${DW} ${DH}`);
  zs.style.cssText = `position:absolute;inset:0;width:${DW}px;height:${DH}px;pointer-events:none;`;
}

// ═══════════════════════════════════════════════════
// PLATFORM TABS
// ═══════════════════════════════════════════════════
function buildTabs() {
  const wrap = document.getElementById('ptabs');
  wrap.innerHTML = '';
  PLATS.forEach(p => {
    const b = document.createElement('button');
    b.className = 'ptab' + (p.id === pid ? ' on' : '');
    b.textContent = p.label;
    if (p.id === pid) {
      b.style.cssText = `border-color:${p.color}55;background:${p.color}0e;color:${p.color};
        border-radius:20px;border-width:1.5px;font-weight:700;`;
    }
    b.onclick = () => { pid = p.id; buildTabs(); rebuild(); };
    wrap.appendChild(b);
  });
}

// ═══════════════════════════════════════════════════
// TOGGLE
// ═══════════════════════════════════════════════════
function toggleZones() {
  showZ = !showZ;
  document.getElementById('btn-z').classList.toggle('on', showZ);
  renderZones();
  renderLabels();
}

// ═══════════════════════════════════════════════════
// FILE HANDLING
// ═══════════════════════════════════════════════════
const dzEl = document.getElementById('dz');
dzEl.addEventListener('dragover', e => { e.preventDefault(); dzEl.classList.add('drag'); });
dzEl.addEventListener('dragleave', () => dzEl.classList.remove('drag'));
dzEl.addEventListener('drop', e => {
  e.preventDefault(); dzEl.classList.remove('drag');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  if (!file) return;
  if (murl) URL.revokeObjectURL(murl);
  if (raf) cancelAnimationFrame(raf);
  murl = URL.createObjectURL(file);
  isVid = file.type.startsWith('video/');
  dzEl.style.display = 'none';
  document.getElementById('btn-new').style.display = 'flex';
  if (isVid) {
    const v = document.createElement('video');
    v.src=murl; v.muted=true; v.loop=true; v.playsInline=true; v.autoplay=true;
    v.onloadeddata = () => { mediaEl=v; v.play(); renderAll(); };
  } else {
    const img = new Image();
    img.onload = () => { mediaEl=img; renderAll(); };
    img.src = murl;
  }
}

function resetFile() {
  if (raf) cancelAnimationFrame(raf);
  if (mediaEl && isVid) mediaEl.pause();
  if (murl) URL.revokeObjectURL(murl);
  mediaEl=null; murl=null; isVid=false;
  dzEl.style.display = 'flex';
  document.getElementById('btn-new').style.display = 'none';
  document.getElementById('l-media').getContext('2d').clearRect(0,0,DW,DH);
  renderAll();
}

function drawMedia() {
  const ctx = document.getElementById('l-media').getContext('2d');
  ctx.clearRect(0,0,DW,DH);
  if (mediaEl) { try { ctx.drawImage(mediaEl,0,0,DW,DH); } catch(e){} }
}

// ═══════════════════════════════════════════════════
// SAFE ZONE SVG
// ═══════════════════════════════════════════════════
function se(tag, a={}) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(a).forEach(([k,v]) => e.setAttribute(k,v));
  return e;
}

function renderZones() {
  const svg = document.getElementById('l-zones');
  svg.innerHTML = '';
  if (!showZ || !mediaEl) return;
  const pl = plat();
  const scX = DW/pl.W, scY = DH/pl.H;

  const defs = se('defs');
  const pat = se('pattern',{id:'sp',patternUnits:'userSpaceOnUse',width:'11',height:'11',patternTransform:'rotate(45)'});
  const ln = se('line',{x1:'0',y1:'0',x2:'0',y2:'11',stroke:'rgba(255,55,55,0.18)','stroke-width':'7'});
  pat.appendChild(ln); defs.appendChild(pat); svg.appendChild(defs);

  let sTop=0, sBot=0, sLeft=0, sRight=0;

  pl.zones.forEach(z => {
    if (z.both) {
      const lw = z.w*scX;
      [[0,lw],[DW-lw,lw]].forEach(([rx,rw]) => {
        svg.appendChild(se('rect',{x:rx,y:0,width:rw,height:DH,fill:'rgba(239,65,65,0.40)'}));
        svg.appendChild(se('rect',{x:rx,y:0,width:rw,height:DH,fill:'url(#sp)'}));
        svg.appendChild(se('rect',{x:rx,y:0,width:rw,height:DH,fill:'none',stroke:'rgba(239,68,68,0.55)','stroke-width':'1.2'}));
      });
      sLeft = Math.max(sLeft,lw); sRight = sLeft;
    } else {
      const x=(z.x||0)*scX, y=(z.y||0)*scY;
      const w=z.w?z.w*scX:DW, h=z.h?z.h*scY:DH;
      svg.appendChild(se('rect',{x,y,width:w,height:h,fill:'rgba(239,65,65,0.42)'}));
      svg.appendChild(se('rect',{x,y,width:w,height:h,fill:'url(#sp)'}));
      svg.appendChild(se('rect',{x,y,width:w,height:h,fill:'none',stroke:'rgba(239,68,68,0.58)','stroke-width':'1.2'}));
      if(!z.x&&z.y===0&&z.h) sTop=Math.max(sTop,h);
      if(!z.x&&z.y>0&&z.h)   sBot=Math.max(sBot,DH-y);
      if(!z.y&&z.x>0&&z.w)   sRight=Math.max(sRight,DW-x);
    }
  });

  svg.appendChild(se('rect',{
    x:sLeft+1,y:sTop+1,width:DW-sLeft-sRight-2,height:DH-sTop-sBot-2,
    fill:'none',stroke:'rgba(255,255,255,0.72)',
    'stroke-width':'1.5','stroke-dasharray':'8 5'
  }));
}

// ═══════════════════════════════════════════════════
// ZONE LABELS — simple list (no absolute positioning)
// ═══════════════════════════════════════════════════
function renderLabels() {
  const panel = document.getElementById('labels-panel');
  panel.innerHTML = '';
  if (!mediaEl) return;

  const pl = plat();
  const scY = DH/pl.H, scX = DW/pl.W;

  // Unsafe zones (skip both-side margins for label)
  pl.zones.forEach(z => {
    if (z.both) return;
    const lbl = document.createElement('div');
    lbl.className = 'zlbl';
    lbl.innerHTML = `<span class="zdot" style="background:#ef4444;"></span>
      <span>${z.label}</span>
      <span class="zpct">${z.pct}</span>`;
    panel.appendChild(lbl);
  });

  // Safe zone
  const safe = document.createElement('div');
  safe.className = 'zlbl safe';
  safe.innerHTML = `<span class="zdot" style="background:#22c55e;"></span>
    <span style="color:#16a34a;font-weight:600;">Safe Zone</span>
    <span class="zpct" style="color:#16a34a;">${pl.safeArea}</span>`;
  panel.appendChild(safe);
}

// ═══════════════════════════════════════════════════
// INFO PANEL
// ═══════════════════════════════════════════════════
function renderInfoPanel() {
  const pl = plat();
  const container = document.getElementById('info-inner');
  container.innerHTML = '';

  // Spec card
  const spec = document.createElement('div');
  spec.className = 'spec-card';
  spec.innerHTML = `
    <div class="spec-plat">
      <span class="spec-dot" style="background:${pl.color};"></span>
      <span class="spec-name">${pl.label}</span>
    </div>
    <table class="spec-table">
      <tr><td>Resolution</td><td>${pl.res}</td></tr>
      <tr><td>Ratio</td><td>${pl.ratio}</td></tr>
      <tr><td>Safe Area</td><td style="color:#16a34a;">${pl.safeArea}</td></tr>
      <tr><td>Unsafe Zones</td><td>${pl.zones.length}</td></tr>
    </table>`;
  container.appendChild(spec);

  // Zone breakdown
  const zb = document.createElement('div');
  zb.className = 'zone-breakdown';
  let sTop=0,sBot=0,sLeft=0,sRight=0;
  pl.zones.forEach(z => {
    if(!z.x&&z.y===0&&z.h)  sTop=Math.max(sTop,z.h);
    if(!z.x&&z.y>0&&z.h)    sBot=Math.max(sBot,pl.H-z.y);
    if(!z.y&&z.x>0&&z.w)    sRight=Math.max(sRight,pl.W-z.x);
    if(z.both&&z.w)          {sLeft=z.w;sRight=Math.max(sRight,z.w);}
  });
  const safeH=pl.H-sTop-sBot, safeW=pl.W-sLeft-sRight;
  const safePct=Math.round(safeW*safeH/(pl.W*pl.H)*100);

  zb.innerHTML = `<div class="zb-title">Zone Breakdown</div><div class="zb-rows" id="zbr"></div>`;
  container.appendChild(zb);
  const zbr = zb.querySelector('#zbr');

  pl.zones.forEach(z => {
    const row = document.createElement('div');
    row.className = 'zb-row';
    const area = z.both ? `${z.px} each side` : z.px;
    row.innerHTML = `<span class="zb-rdot" style="background:#ef4444;"></span>
      <span class="zb-label">${z.label}</span>
      <span class="zb-px">${area}</span>
      <span class="zb-pct">${z.pct}</span>`;
    zbr.appendChild(row);
  });

  const safeRow = document.createElement('div');
  safeRow.className = 'zb-row safe-row';
  safeRow.innerHTML = `<span class="zb-rdot" style="background:#22c55e;"></span>
    <span class="zb-label" style="color:#16a34a;font-weight:600;">Safe Zone</span>
    <span class="zb-px" style="color:#16a34a;">${pl.safeArea}</span>
    <span class="zb-pct safe-pct">${safePct}%</span>`;
  zbr.appendChild(safeRow);

  // Tips
  const tips = document.createElement('div');
  tips.className = 'tips-col';
  const mob = isMobile();
  tips.innerHTML = `<div class="tips-title">💡 Design Tips</div>
    <div class="${mob?'tips-grid':''}">
      ${pl.tips.map(t=>`<div class="tip-item"><span class="tip-icon">${t.icon}</span><span>${t.text}</span></div>`).join('')}
    </div>`;
  container.appendChild(tips);
}

// ═══════════════════════════════════════════════════
// RENDER + REBUILD
// ═══════════════════════════════════════════════════
function renderAll() {
  if (!isVid) drawMedia();
  if (isVid && mediaEl && !raf) {
    const loop = () => { drawMedia(); raf = requestAnimationFrame(loop); };
    raf = requestAnimationFrame(loop);
  }
  renderZones();
  renderLabels();
  renderInfoPanel();
}

function rebuild() {
  applySize();
  renderAll();
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
buildTabs();
renderInfoPanel();
window.addEventListener('resize', () => { setTimeout(rebuild, 50); });
setTimeout(rebuild, 60);
</script>
