<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>SafeZone — Ad Safe Zone Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:#F0F1F5;-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;overflow:hidden;}
button{font-family:inherit;cursor:pointer;}
input[type=file]{display:none;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:4px;}

/* ════════════════════════════════════
   TOP BAR
════════════════════════════════════ */
#bar{
  background:#fff;border-bottom:1px solid #e5e7eb;flex-shrink:0;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.bar-row1{
  height:54px;display:flex;align-items:center;padding:0 16px;gap:12px;
}
/* Logo */
.logo{display:flex;align-items:center;gap:10px;flex:1;text-decoration:none;}
.logo-icon{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#a855f7 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(99,102,241,.35);
}
.logo-text{display:flex;flex-direction:column;line-height:1.2;}
.logo-name{font-size:14px;font-weight:700;letter-spacing:-.03em;color:#111;}
.logo-sub{font-size:9.5px;color:#9ca3af;font-weight:400;letter-spacing:.01em;}

/* Action buttons */
.bar-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.tbtn{
  display:flex;align-items:center;gap:5px;padding:7px 13px;
  border-radius:8px;border:1.5px solid #e5e7eb;background:#fff;
  font-size:12px;font-weight:500;color:#6b7280;cursor:pointer;
  white-space:nowrap;transition:all .15s;
}
.tbtn:hover{background:#f9fafb;}
.tbtn.on{border-color:#6366f155;background:#6366f108;color:#6366f1;font-weight:600;}
.newbtn{
  display:flex;align-items:center;gap:5px;padding:7px 12px;
  border-radius:8px;border:1.5px solid #e5e7eb;background:#fff;
  font-size:12px;font-weight:500;color:#6b7280;cursor:pointer;white-space:nowrap;
}
#upload-label{
  display:flex;align-items:center;gap:6px;padding:8px 16px;
  border-radius:8px;background:#111;color:#fff;
  font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;
  transition:background .15s;user-select:none;-webkit-user-select:none;
}
#upload-label:hover{background:#222;}
#upload-label:active{background:#333;}
#upload-label input{display:none;}

/* Platform tabs row */
.bar-row2{
  display:flex;gap:5px;padding:0 16px 11px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.bar-row2::-webkit-scrollbar{display:none;}
.ptab{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:20px;
  border:1.5px solid #e5e7eb;background:#fff;
  font-size:11.5px;font-weight:500;color:#6b7280;
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;
}
.ptab:hover{background:#f9fafb;}
.ptab.on{font-weight:700;}
.ptab-logo{width:14px;height:14px;flex-shrink:0;}

/* ════════════════════════════════════
   BODY + STAGE
════════════════════════════════════ */
#body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
#stage{
  flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;min-height:0;padding:16px;
}
#stage-inner{display:flex;align-items:center;justify-content:center;gap:16px;width:100%;height:100%;}

/* Canvas card */
#ccard{
  position:relative;flex-shrink:0;
  border-radius:12px;overflow:hidden;line-height:0;
  box-shadow:
    0 20px 60px rgba(0,0,0,.22),
    0 4px 16px rgba(0,0,0,.12),
    0 0 0 1px rgba(0,0,0,.06);
}
#l-media{display:block;}
#l-zones{position:absolute;inset:0;pointer-events:none;}

/* ── UPLOAD / DROP ZONE ── */
#dz{
  position:absolute;inset:0;border-radius:inherit;
  background:#111;overflow:hidden;
}
/* Subtle gradient glow on bg */
#dz::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 40%,rgba(99,102,241,.15) 0%,transparent 70%),
             radial-gradient(ellipse at 70% 70%,rgba(168,85,247,.1) 0%,transparent 60%);
}
#dz-label{
  position:absolute;inset:0;z-index:2;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
#dz-label input{display:none;}
.dz-icon-wrap{
  width:60px;height:60px;border-radius:18px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.dz-t{font-size:14px;font-weight:600;color:#fff;text-align:center;pointer-events:none;}
.dz-s{font-size:11px;color:rgba(255,255,255,.35);text-align:center;pointer-events:none;}
.dz-formats{
  display:flex;gap:5px;flex-wrap:wrap;justify-content:center;pointer-events:none;
}
.dz-fmt{
  font-size:10px;font-weight:500;color:rgba(255,255,255,.35);
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  padding:2px 7px;border-radius:4px;font-family:'Courier New',monospace;
}
.dz-lock{font-size:10.5px;color:rgba(255,255,255,.2);text-align:center;pointer-events:none;}

/* ── ZONE LABELS ── */
#labels-panel{display:flex;flex-direction:column;gap:7px;flex-shrink:0;}
.zlbl{
  display:flex;align-items:center;gap:8px;
  padding:7px 12px 7px 10px;
  background:#fff;border:1.5px solid #e5e7eb;
  border-radius:10px;font-size:11.5px;font-weight:500;color:#374151;
  box-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 8px rgba(0,0,0,.03);
  white-space:nowrap;transition:all .15s;
}
.zlbl:hover{box-shadow:0 2px 8px rgba(0,0,0,.1);}
.zdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.zlbl-name{flex:1;font-size:11px;}
.zpct{
  font-size:10px;font-family:'Courier New',monospace;font-weight:700;
  padding:2px 6px;border-radius:4px;
}

/* ════════════════════════════════════
   INFO PANEL
════════════════════════════════════ */
#info-panel{
  flex-shrink:0;background:#fff;border-top:1px solid #e5e7eb;overflow-y:auto;
}
.info-inner{padding:14px 18px;display:flex;gap:16px;align-items:stretch;}

/* Spec card */
.spec-card{
  background:linear-gradient(135deg,#f8f9ff 0%,#f3f4f8 100%);
  border:1px solid #e5e7eb;border-radius:12px;
  padding:13px 15px;flex-shrink:0;min-width:200px;
}
.spec-header{display:flex;align-items:center;gap:9px;margin-bottom:11px;}
.spec-logo{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.spec-name{font-size:13px;font-weight:700;color:#111;}
.spec-table{width:100%;border-collapse:collapse;}
.spec-table tr+tr td{padding-top:4px;}
.spec-table td{font-size:11px;color:#6b7280;vertical-align:top;padding:2px 0;}
.spec-table td:first-child{font-weight:600;color:#374151;padding-right:12px;white-space:nowrap;width:80px;}
.spec-table td:last-child{font-family:'Courier New',monospace;color:#6366f1;font-weight:500;}

/* Zone breakdown */
.zone-breakdown{flex:1;min-width:0;}
.panel-title{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;}
.zb-rows{display:flex;flex-direction:column;gap:5px;}
.zb-row{
  display:flex;align-items:center;gap:8px;
  padding:6px 9px;border-radius:8px;border:1px solid transparent;
  transition:all .12s;
}
.zb-rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.zb-label{font-size:11px;font-weight:500;flex:1;min-width:80px;}
.zb-px{font-size:10px;color:#9ca3af;font-family:'Courier New',monospace;}
.zb-pct{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;margin-left:auto;}

/* Tips */
.tips-col{flex-shrink:0;padding:0 0 0 16px;border-left:1px solid #e5e7eb;}
.tip-item{display:flex;gap:7px;margin-bottom:6px;font-size:11px;color:#6b7280;line-height:1.5;}
.tip-icon{font-size:12px;flex-shrink:0;margin-top:1px;}

/* ════════════════════════════════════
   RESPONSIVE
════════════════════════════════════ */
@media(max-width:600px){
  .bar-row1{height:50px;padding:0 12px;}
  .logo-sub{display:none;}
  .bar-row2{padding:0 12px 9px;gap:5px;}
  .ptab{padding:5px 10px;font-size:11px;}
  #stage{padding:10px;}
  #stage-inner{flex-direction:column;align-items:center;}
  #labels-panel{flex-direction:row;flex-wrap:wrap;justify-content:center;gap:5px;width:100%;}
  .zlbl{font-size:10.5px;padding:5px 9px 5px 8px;}
  .info-inner{flex-direction:column;gap:10px;padding:11px 13px;}
  .spec-card{min-width:0;}
  .tips-col{border-left:none;border-top:1px solid #e5e7eb;padding:10px 0 0;width:100%;}
  .tips-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
  .tip-item{margin-bottom:0;}
  #info-panel{max-height:190px;}
}
@media(min-width:601px) and (max-width:900px){
  #stage-inner{flex-direction:row;align-items:center;}
  #labels-panel{flex-direction:column;width:168px;}
  .info-inner{flex-direction:column;gap:10px;}
  .tips-col{border-left:none;border-top:1px solid #e5e7eb;padding:10px 0 0;}
  #info-panel{max-height:175px;}
}
@media(min-width:901px){
  #stage-inner{flex-direction:row;align-items:center;}
  #labels-panel{flex-direction:column;width:195px;}
  .tips-col{width:205px;}
  #info-panel{max-height:200px;}
}
</style>
</head>
<body>

<!-- ════ TOP BAR ════ -->
<div id="bar">
  <div class="bar-row1">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" fill="white" opacity=".9"/>
          <path d="M9 12l2 2 4-4" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">SafeZone</div>
        <div class="logo-sub">Ad Safe Zone Checker</div>
      </div>
    </div>
    <div class="bar-actions">
      <button class="tbtn on" id="btn-z" onclick="toggleZones()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Zones
      </button>
      <button class="newbtn" id="btn-new" style="display:none;" onclick="resetFile()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
        </svg>
        New
      </button>
      <label id="upload-label">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
        </svg>
        Upload Creative
        <input type="file" accept="image/jpeg,image/png,image/webp,video/mp4,video/webm,video/quicktime"
          onchange="handleFile(this.files[0]);this.value=''">
      </label>
    </div>
  </div>
  <div class="bar-row2" id="ptabs"></div>
</div>

<!-- ════ BODY ════ -->
<div id="body">
  <div id="stage">
    <div id="stage-inner">
      <!-- Canvas -->
      <div id="ccard">
        <canvas id="l-media"></canvas>
        <!-- Upload state -->
        <div id="dz">
          <label id="dz-label">
            <input type="file" accept="image/jpeg,image/png,image/webp,video/mp4,video/webm,video/quicktime"
              onchange="handleFile(this.files[0]);this.value=''">
            <div class="dz-icon-wrap">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="1.6">
                <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
                <path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/>
              </svg>
            </div>
            <p class="dz-t">Tap to upload your creative</p>
            <p class="dz-s">or drag & drop here</p>
            <div class="dz-formats">
              <span class="dz-fmt">JPG</span>
              <span class="dz-fmt">PNG</span>
              <span class="dz-fmt">WebP</span>
              <span class="dz-fmt">MP4</span>
              <span class="dz-fmt">WebM</span>
            </div>
            <p class="dz-lock">🔒 Stays in your browser — never uploaded</p>
          </label>
        </div>
        <svg id="l-zones" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <!-- Labels -->
      <div id="labels-panel"></div>
    </div>
  </div>

  <!-- Info panel -->
  <div id="info-panel">
    <div class="info-inner" id="info-inner"></div>
  </div>
</div>

let pid='ig-stories',DW=0,DH=0;

function calcSize(){
  const stage=document.getElementById('stage');
  const pl=plat();const W=window.innerWidth;
  let avW,avH;
  if(W<=600){avW=Math.min(stage.clientWidth-20,300);avH=Math.min(stage.clientHeight-80,520);}
  else if(W<=900){avW=Math.min(stage.clientWidth-190,280);avH=Math.min(stage.clientHeight-30,560);}
  else{avW=Math.min(stage.clientWidth-220,300);avH=Math.min(stage.clientHeight-30,630);}
  if(avW/avH>pl.ar){DH=Math.max(avH,100);DW=Math.floor(DH*pl.ar);}
  else{DW=Math.max(avW,80);DH=Math.floor(DW/pl.ar);}
}
function applySize(){
  calcSize();
  const card=document.getElementById('ccard');
  card.style.width=DW+'px';card.style.height=DH+'px';
  const mc=document.getElementById('l-media');
  mc.width=DW;mc.height=DH;mc.style.cssText=`display:block;width:${DW}px;height:${DH}px;`;
  const zs=document.getElementById('l-zones');
  zs.setAttribute('width',DW);zs.setAttribute('height',DH);
  zs.setAttribute('viewBox',`0 0 ${DW} ${DH}`);
  zs.style.cssText=`position:absolute;inset:0;width:${DW}px;height:${DH}px;pointer-events:none;`;
}

const dzEl=document.getElementById('dz');
dzEl.addEventListener('dragover',e=>{e.preventDefault();dzEl.style.background='#1c1830';});
dzEl.addEventListener('dragleave',()=>{dzEl.style.background='#111';});
dzEl.addEventListener('drop',e=>{
  e.preventDefault();dzEl.style.background='#111';
  if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);
});

function handleFile(file){
  if(!file)return;
  if(murl)URL.revokeObjectURL(murl);if(raf)cancelAnimationFrame(raf);raf=null;
  murl=URL.createObjectURL(file);isVid=file.type.startsWith('video/');
  dzEl.style.display='none';
  document.getElementById('btn-new').style.display='flex';
  if(isVid){
    const v=document.createElement('video');
    v.src=murl;v.muted=true;v.loop=true;v.playsInline=true;v.autoplay=true;
    v.onloadeddata=()=>{mediaEl=v;v.play();renderAll();};
  }else{
    const img=new Image();
    img.onload=()=>{mediaEl=img;renderAll();};
    img.src=murl;
  }
}
function resetFile(){
  if(raf)cancelAnimationFrame(raf);raf=null;
  if(mediaEl&&isVid)mediaEl.pause();
  if(murl)URL.revokeObjectURL(murl);
  mediaEl=null;murl=null;isVid=false;
  dzEl.style.display='flex';
  document.getElementById('btn-new').style.display='none';
  document.getElementById('l-media').getContext('2d').clearRect(0,0,DW,DH);
  renderAll();
}
function drawMedia(){
  const ctx=document.getElementById('l-media').getContext('2d');
  ctx.clearRect(0,0,DW,DH);
  if(mediaEl){try{ctx.drawImage(mediaEl,0,0,DW,DH);}catch(e){}}
}

// ══════════════════════════════════════════════════════
// SVG ZONES
// ══════════════════════════════════════════════════════
function se(tag,a={}){
  const e=document.createElementNS('http://www.w3.org/2000/svg',tag);
  Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e;
}
function drawRect(svg,x,y,w,h,col,pid2,rx=0){
  if(rx){
    svg.appendChild(se('rect',{x,y,width:w,height:h,rx,ry:rx,fill:col.fill}));
    svg.appendChild(se('rect',{x,y,width:w,height:h,rx,ry:rx,fill:`url(#${pid2})`}));
    svg.appendChild(se('rect',{x,y,width:w,height:h,rx,ry:rx,fill:'none',stroke:col.border,'stroke-width':'1.5'}));
  }else{
    svg.appendChild(se('rect',{x,y,width:w,height:h,fill:col.fill}));
    svg.appendChild(se('rect',{x,y,width:w,height:h,fill:`url(#${pid2})`}));
    svg.appendChild(se('rect',{x,y,width:w,height:h,fill:'none',stroke:col.border,'stroke-width':'1.5'}));
  }
}

function renderZones(){
  const svg=document.getElementById('l-zones'); svg.innerHTML='';
  if(!showZ||!mediaEl) return;
  const pl=plat(); const scX=DW/pl.W, scY=DH/pl.H;

  // ── RULER MODE (IG Reels) — no fill overlays, just dimension lines ──
  if(pl.rulerMode){
    drawRulerMode(svg, pl, scX, scY);
    return;
  }

  // ── STANDARD MODE — colored overlays ──
  const defs=se('defs'); svg.appendChild(defs);
  ['top','bottom','right','sides'].forEach(k=>{
    const c2=ZC[k];
    const pat=se('pattern',{id:'p-'+k,patternUnits:'userSpaceOnUse',width:'12',height:'12',patternTransform:'rotate(45)'});
    const ln=se('line',{x1:'0',y1:'0',x2:'0',y2:'12',stroke:c2.stripe,'stroke-width':'7'});
    pat.appendChild(ln); defs.appendChild(pat);
  });

  let sTop=0,sBot=0,sLeft=0,sRight=0;
  pl.zones.forEach(z=>{
    const col=zCol(z);
    const pk=z.both?'sides':z.iconSpots?'right':z.h&&(z.y||0)===0?'top':'bottom';
    if(z.both){
      const lw=z.w*scX;
      drawRect(svg,0,0,lw,DH,col,'p-'+pk);
      drawRect(svg,DW-lw,0,lw,DH,col,'p-'+pk);
      sLeft=Math.max(sLeft,lw); sRight=sLeft;
    }else if(z.iconSpots&&z.spots){
      const zx=(z.x||0)*scX, zw=z.w*scX;
      svg.appendChild(se('rect',{x:zx,y:0,width:zw,height:DH,
        fill:'rgba(139,92,246,0.04)',stroke:'rgba(139,92,246,0.22)','stroke-width':'1','stroke-dasharray':'5 4'}));
      const rx=Math.round(zw*0.22);
      z.spots.forEach(sp=>{
        const sy=sp.y*scY, sh=sp.h*scY;
        drawRect(svg,zx+zw*0.06,sy,zw*0.88,sh,col,'p-right',rx);
      });
      sRight=Math.max(sRight,DW-zx);
    }else if(z.reelRight){
      const zx=(z.x||0)*scX;
      sRight=Math.max(sRight,DW-zx);
    }else{
      const x=(z.x||0)*scX, y=(z.y||0)*scY;
      const w=z.w?z.w*scX:DW, h=z.h?z.h*scY:DH;
      drawRect(svg,x,y,w,h,col,'p-'+pk);
      if(!z.x&&(z.y||0)===0&&z.h) sTop=Math.max(sTop,h);
      if(!z.x&&z.y>0&&z.h)        sBot=Math.max(sBot,DH-y);
      if(!z.y&&z.x>0&&z.w)        sRight=Math.max(sRight,DW-x);
    }
  });

  svg.appendChild(se('rect',{
    x:sLeft+1,y:sTop+1,width:DW-sLeft-sRight-2,height:DH-sTop-sBot-2,
    fill:'rgba(34,197,94,0.03)',stroke:'rgba(34,197,94,0.72)',
    'stroke-width':'1.8','stroke-dasharray':'9 5'
  }));
}

// ── RULER MODE RENDERER ───────────────────────────────────────────────────────
// Matches the official Instagram safe zone diagram:
// clean image, thin gray border showing safe zone, small % labels with tick marks
function drawRulerMode(svg, pl, scX, scY){
  const lc = 'rgba(80,80,90,0.75)';   // line color — dark gray
  const tc = '#3a3a4a';               // text color
  const fs = Math.max(9, Math.min(13, DW * 0.038)); // font size
  const tick = 6;                     // tick mark size px
  const gap  = 8;                     // gap between canvas edge and label

  // Safe zone pixel values (native)
  const topH   = 268;  // 14% top
  const botH   = 672;  // 35% bottom  (so bottom starts at 1920-672=1248)
  const sideW  = 65;   // 6% each side
  const rightW = 228;  // 21% right (action icons)

  // Scaled to display
  const dTop   = topH  * scY;
  const dBot   = botH  * scY;
  const dSide  = sideW * scX;
  const dRight = rightW* scX;

  // Safe zone rect
  const sx = dSide;
  const sy = dTop;
  const sw = DW - dSide - dRight;
  const sh = DH - dTop - dBot;

  // ── 1. Safe zone border — thin solid gray line (like the screenshot)
  svg.appendChild(se('rect',{
    x:sx, y:sy, width:sw, height:sh,
    fill:'none',
    stroke:'rgba(60,60,70,0.55)',
    'stroke-width':'1.2',
    'stroke-dasharray':'none'
  }));

  // ── 2. Dimension lines + labels outside the canvas ──────────────────

  function hLabel(text, x, y, align='middle'){
    const t = se('text',{
      x, y,
      'text-anchor': align,
      'dominant-baseline':'middle',
      fill: tc,
      'font-size': fs,
      'font-family':'Inter,system-ui,sans-serif',
      'font-weight':'500'
    });
    t.textContent = text;
    svg.appendChild(t);
  }

  function tickH(x1,y,x2){ // horizontal tick pair
    svg.appendChild(se('line',{x1,y1:y,x2:x1,y2:y+tick,stroke:lc,'stroke-width':'1.2'}));
    svg.appendChild(se('line',{x1:x2,y1:y,x2,y2:y+tick,stroke:lc,'stroke-width':'1.2'}));
    svg.appendChild(se('line',{x1,y1:y+tick/2,x2,y2:y+tick/2,stroke:lc,'stroke-width':'1'}));
  }
  function tickV(x,y1,y2){ // vertical tick pair
    svg.appendChild(se('line',{x1:x,y1,x2:x+tick,y2:y1,stroke:lc,'stroke-width':'1.2'}));
    svg.appendChild(se('line',{x1:x,y1:y2,x2:x+tick,y2,stroke:lc,'stroke-width':'1.2'}));
    svg.appendChild(se('line',{x1:x+tick/2,y1,x2:x+tick/2,y2,stroke:lc,'stroke-width':'1'}));
  }

  // ── TOP: 14% ──
  // Bracket above canvas showing top unsafe zone height
  const tBracketY = -18;
  // Left tick at x=dSide, right tick at x=DW-dRight
  // Vertical line from canvas top to safe zone top, on the right side
  const rightEdgeX = DW - dRight + 18;
  svg.appendChild(se('line',{x1:rightEdgeX,y1:0,x2:rightEdgeX,y2:sy,
    stroke:lc,'stroke-width':'1'}));
  svg.appendChild(se('line',{x1:rightEdgeX-tick,y1:0,x2:rightEdgeX+tick,y2:0,
    stroke:lc,'stroke-width':'1.2'}));
  svg.appendChild(se('line',{x1:rightEdgeX-tick,y1:sy,x2:rightEdgeX+tick,y2:sy,
    stroke:lc,'stroke-width':'1.2'}));
  hLabel('14%', rightEdgeX+gap+fs*1.2, sy/2, 'start');

  // ── BOTTOM: 35% or 40% ──
  const botStartY = DH - dBot;
  const leftEdgeX = dSide - 18;
  svg.appendChild(se('line',{x1:leftEdgeX,y1:botStartY,x2:leftEdgeX,y2:DH,
    stroke:lc,'stroke-width':'1'}));
  svg.appendChild(se('line',{x1:leftEdgeX-tick,y1:botStartY,x2:leftEdgeX+tick,y2:botStartY,
    stroke:lc,'stroke-width':'1.2'}));
  svg.appendChild(se('line',{x1:leftEdgeX-tick,y1:DH,x2:leftEdgeX+tick,y2:DH,
    stroke:lc,'stroke-width':'1.2'}));
  hLabel('35%', leftEdgeX-gap-fs*1.2, botStartY+(DH-botStartY)/2, 'end');

  // ── RIGHT: 21% (action icons) ──
  // Horizontal bracket below canvas
  const botBracketY = DH + 18;
  svg.appendChild(se('line',{x1:DW-dRight,y1:botBracketY,x2:DW,y2:botBracketY,
    stroke:lc,'stroke-width':'1'}));
  svg.appendChild(se('line',{x1:DW-dRight,y1:botBracketY-tick,x2:DW-dRight,y2:botBracketY+tick,
    stroke:lc,'stroke-width':'1.2'}));
  svg.appendChild(se('line',{x1:DW,y1:botBracketY-tick,x2:DW,y2:botBracketY+tick,
    stroke:lc,'stroke-width':'1.2'}));
  hLabel('21%', DW-dRight+(dRight/2), botBracketY+gap+fs, 'middle');

  // ── LEFT SIDE: 6% ──
  const topBracketY = -18;
  svg.appendChild(se('line',{x1:0,y1:topBracketY,x2:dSide,y2:topBracketY,
    stroke:lc,'stroke-width':'1'}));
  svg.appendChild(se('line',{x1:0,y1:topBracketY-tick,x2:0,y2:topBracketY+tick,
    stroke:lc,'stroke-width':'1.2'}));
  svg.appendChild(se('line',{x1:dSide,y1:topBracketY-tick,x2:dSide,y2:topBracketY+tick,
    stroke:lc,'stroke-width':'1.2'}));
  hLabel('6%', dSide/2, topBracketY-gap-fs, 'middle');

  // ── RIGHT SIDE margin: 6% ──
  svg.appendChild(se('line',{x1:DW-dSide,y1:topBracketY,x2:DW,y2:topBracketY,
    stroke:lc,'stroke-width':'1'}));
  svg.appendChild(se('line',{x1:DW-dSide,y1:topBracketY-tick,x2:DW-dSide,y2:topBracketY+tick,
    stroke:lc,'stroke-width':'1.2'}));
  svg.appendChild(se('line',{x1:DW,y1:topBracketY-tick,x2:DW,y2:topBracketY+tick,
    stroke:lc,'stroke-width':'1.2'}));
  hLabel('6%', DW-dSide/2, topBracketY-gap-fs, 'middle');
}


// ══════════════════════════════════════════════════════
// ZONE LABELS
// ══════════════════════════════════════════════════════
function renderLabels(){
  const panel=document.getElementById('labels-panel');panel.innerHTML='';
  if(!mediaEl)return;
  const pl=plat();
  const toShow=[...pl.zones.filter(z=>!z.both)];
  const sideZ=pl.zones.find(z=>z.both);
  if(sideZ)toShow.push(sideZ);

  toShow.forEach(z=>{
    const col=zCol(z);
    const lbl=document.createElement('div');lbl.className='zlbl';
    lbl.style.borderColor=col.bdr;lbl.style.background=col.bg;
    lbl.innerHTML=`
      <span class="zdot" style="background:${col.dot};"></span>
      <span class="zlbl-name" style="color:${col.txt};">${z.label}</span>
      <span class="zpct" style="background:${col.pBg};color:${col.pTxt};">${z.pct}</span>`;
    panel.appendChild(lbl);
  });

  // Safe zone
  const sc=ZC.safe;
  const safe=document.createElement('div');safe.className='zlbl';
  safe.style.borderColor=sc.bdr;safe.style.background=sc.bg;
  safe.innerHTML=`
    <span class="zdot" style="background:${sc.dot};"></span>
    <span class="zlbl-name" style="font-weight:600;color:${sc.txt};">Safe Zone</span>
    <span class="zpct" style="background:${sc.pBg};color:${sc.pTxt};font-family:'Courier New',monospace;font-size:9.5px;">${pl.safeArea}</span>`;
  panel.appendChild(safe);
}

// ══════════════════════════════════════════════════════
// INFO PANEL
// ══════════════════════════════════════════════════════
function renderInfoPanel(){
  const pl=plat();
  const container=document.getElementById('info-inner');container.innerHTML='';

  // Spec card with platform logo
  const spec=document.createElement('div');spec.className='spec-card';
  const logoColor=pl.color==='#010101'?'#111':pl.color;
  const logoBg=pl.color==='#FFFC00'?'#FFFC00':pl.color==='#010101'?'#111':pl.color;
  spec.innerHTML=`
    <div class="spec-header">
      <div class="spec-logo" style="background:${logoBg};">${LOGOS[pl.logoKey]||''}</div>
      <div>
        <div class="spec-name">${pl.label}</div>
      </div>
    </div>
    <table class="spec-table">
      <tr><td>Resolution</td><td>${pl.res}</td></tr>
      <tr><td>Aspect Ratio</td><td>${pl.ratio}</td></tr>
      <tr><td>Safe Area</td><td style="color:#16a34a;">${pl.safeArea}</td></tr>
      <tr><td>Zones</td><td>${pl.zones.length} unsafe</td></tr>
    </table>`;
  container.appendChild(spec);

  // Zone breakdown
  const zb=document.createElement('div');zb.className='zone-breakdown';
  let sT=0,sB=0,sL=0,sR=0;
  pl.zones.forEach(z=>{
    if(!z.x&&(z.y||0)===0&&z.h) sT=Math.max(sT,z.h);
    if(!z.x&&z.y>0&&z.h)        sB=Math.max(sB,pl.H-z.y);
    if(!z.y&&z.x>0&&z.w)        sR=Math.max(sR,pl.W-z.x);
    if(z.both&&z.w){sL=z.w;sR=Math.max(sR,z.w);}
  });
  const safePct=Math.round((pl.W-sL-sR)*(pl.H-sT-sB)/(pl.W*pl.H)*100);

  zb.innerHTML=`<div class="panel-title">Zone Breakdown</div><div class="zb-rows" id="zbr"></div>`;
  container.appendChild(zb);
  const zbr=zb.querySelector('#zbr');

  pl.zones.forEach(z=>{
    const col=zCol(z);
    const row=document.createElement('div');row.className='zb-row';
    row.style.background=col.bg;row.style.borderColor=col.bdr;
    row.innerHTML=`
      <span class="zb-rdot" style="background:${col.dot};"></span>
      <span class="zb-label" style="color:${col.txt};">${z.label}</span>
      <span class="zb-px">${z.both?z.px+' each side':z.px}</span>
      <span class="zb-pct" style="background:${col.pBg};color:${col.pTxt};">${z.pct}</span>`;
    zbr.appendChild(row);
  });

  const sc=ZC.safe;
  const sr=document.createElement('div');sr.className='zb-row';
  sr.style.background=sc.bg;sr.style.borderColor=sc.bdr;
  sr.innerHTML=`
    <span class="zb-rdot" style="background:${sc.dot};"></span>
    <span class="zb-label" style="font-weight:600;color:${sc.txt};">Safe Zone</span>
    <span class="zb-px" style="color:${sc.txt};">${pl.safeArea}</span>
    <span class="zb-pct" style="background:${sc.pBg};color:${sc.pTxt};">${safePct}%</span>`;
  zbr.appendChild(sr);

  // Tips
  const tips=document.createElement('div');tips.className='tips-col';
  tips.innerHTML=`<div class="panel-title">💡 Design Tips</div>
    <div class="${isMob()?'tips-grid':''}">
      ${pl.tips.map(t=>`<div class="tip-item"><span class="tip-icon">${t.i}</span><span>${t.t}</span></div>`).join('')}
    </div>`;
  container.appendChild(tips);
}

// ══════════════════════════════════════════════════════
// RENDER + REBUILD
// ══════════════════════════════════════════════════════
function renderAll(){
  if(!isVid)drawMedia();
  if(isVid&&mediaEl&&!raf){const lp=()=>{drawMedia();raf=requestAnimationFrame(lp);};raf=requestAnimationFrame(lp);}
  renderZones();renderLabels();renderInfoPanel();
}
function rebuild(){applySize();renderAll();}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
buildTabs();renderInfoPanel();
window.addEventListener('resize',()=>setTimeout(rebuild,50));
setTimeout(rebuild,60);
</script>
